<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seen Website Explorations</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }
    h1 {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 48px;
    }
    .versions {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    a.card {
      display: block;
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 32px 40px;
      text-decoration: none;
      color: #fff;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      min-width: 180px;
    }
    a.card:hover { background: #1a1a1a; border-color: #444; }
    .card-label {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 13px;
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Seen — Website Explorations</h1>
  <div class="versions">
    <a class="card" href="v1/">
      <div class="card-label">V1</div>
      <div class="card-desc">Original<br>Blue theme</div>
    </a>
    <a class="card" href="v2/">
      <div class="card-label">V2</div>
      <div class="card-desc">Dark immersive<br>Glass-morphism</div>
    </a>
    <a class="card" href="v3/">
      <div class="card-label">V3</div>
      <div class="card-desc">Brand refresh<br>Green palette</div>
    </a>
  </div>
</body>
</html>
